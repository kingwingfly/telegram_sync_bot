apiVersion: apps/v1
kind: Deployment
metadata:
  name: sync-bot-server
spec:
  selector:
    matchLabels:
      app: sync-bot-server
  replicas: 1
  template:
    metadata:
      labels:
        app: sync-bot-server
    spec:
      containers:
        - name: server
          image: localhost/server:latest
          imagePullPolicy: Never
          envFrom:
            - secretRef:
                name: sync-bot-secret
          resources:
            requests:
              cpu: "10m"
              memory: "50Mi"
            limits:
              cpu: "100m"
              memory: "100Mi"
          volumeMounts:
            - name: shared-data
              mountPath: /app/data

      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: sync-bot-pvc
